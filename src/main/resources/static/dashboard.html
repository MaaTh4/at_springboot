<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Mestre | Guilda Interativa</title>
    <meta name="description" content="Dashboard de Gestão de Aventureiros para Mestres da Guilda.">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="glass-panel dashboard-navbar">
        <h2>🛡️ Central da Guilda</h2>
        <div class="dashboard-user">
            <span id="masterNameDisplay">Bem-vindo, Mestre</span>
            <button id="logoutBtn" class="btn"
                style="background: rgba(255,255,255,0.1); padding: 0.5rem 1rem;">Sair</button>
        </div>
    </nav>

    <main class="dashboard-main fade-in">
        <!-- Formulario de Recrutamento -->
        <aside class="glass-panel content-section fade-in delay-1">
            <div style="margin-bottom: 2rem;">
                <h3>Recrutar Aventureiro</h3>
                <p>Inscreva um novo membro na corporação.</p>
            </div>

            <div id="cadastroAlert" class="alert alert-success"></div>

            <form id="aventurreiroForm">
                <div class="form-group">
                    <label for="advNome">Nome do Aventureiro</label>
                    <input type="text" id="advNome" placeholder="Ex: Gimli" required>
                </div>

                <div class="form-group">
                    <label for="advClasse">Classe de Combate</label>
                    <select id="advClasse" required>
                        <option value="GUERREIRO">Guerreiro</option>
                        <option value="MAGO">Mago</option>
                        <option value="ARQUEIRO">Arqueiro</option>
                        <option value="LADINO">Rogue (Ladino)</option>
                        <option value="CLERIGO">Clérigo</option>
                        <option value="PALADINO">Paladino</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="advNivel">Nível Inicial</label>
                    <input type="number" id="advNivel" min="1" max="100" value="1" required>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Registrar Aventureiro</button>
            </form>
        </aside>

        <!-- Lista de Membros -->
        <section class="glass-panel content-section fade-in delay-2">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h3>Membros da Guilda</h3>
                    <p>Aventureiros ativos e inativos em nossos registros.</p>
                </div>
                <button id="refreshBtn" class="btn"
                    style="background: transparent; border: 1px solid var(--glass-border);">🔄 Atualizar</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Classe</th>
                            <th>Nível</th>
                            <th>Status</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="aventurreirosList">
                        <tr>
                            <td colspan="6" style="text-align: center;">Carregando aventureiros...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div style="margin-top: 1rem; text-align: right;">
                <p id="totalInfo" style="font-size: 0.875rem;">Total listado: 0</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        // Check authentication immediately
        if (!localStorage.getItem('guilda_master')) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('masterNameDisplay').textContent = `Bem-vindo, ${localStorage.getItem('guilda_master')}`;
        }
    </script>
</body>

</html>
