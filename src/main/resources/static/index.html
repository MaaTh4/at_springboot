<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso à Guilda Sagrada</title>
    <meta name="description" content="Portal de Entrada Oficial da Guilda. Somente Mestres autorizados.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="glass-panel login-box">
            <div class="login-header">
                <h1>Guilda Admin</h1>
                <p>Identifique-se para gerenciar os Aventureiros.</p>
            </div>

            <div id="loginAlert" class="alert alert-error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuário do Mestre</label>
                    <input type="text" id="username" placeholder="Ex: mestre_guilda" required autofocus autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Senha de Acesso</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">
                    Entrar no Painel
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Ainda não tem Mestre? <a href="#" id="createMasterLink" style="color: var(--accent); text-decoration: none;">Cadastrar Primeiro Mestre</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
